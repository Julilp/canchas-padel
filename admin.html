<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCHVIEW - ADMIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;800&family=DM+Sans:wght@400;500;600;700&display=swap');

        :root {
            --primario: #ccff00;
            --fondo: #080808;
            --surface: #111;
            --surface2: #1a1a1a;
            --borde: #222;
            --texto: #e0e0e0;
            --texto2: #888;
            --danger: #ff4444;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--fondo);
            color: var(--texto);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── LOGIN ── */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--borde);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--primario);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .login-sub {
            color: var(--texto2);
            font-size: 14px;
            margin-bottom: 36px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--texto2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--fondo);
            border: 1px solid var(--borde);
            border-radius: var(--radius);
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primario);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primario);
            color: #000;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary:hover {
            filter: brightness(0.9);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--texto);
            border: 1px solid var(--borde);
        }

        .btn-secondary:hover {
            border-color: var(--primario);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* ── ADMIN PANEL ── */
        .admin-panel {
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--borde);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--primario);
            letter-spacing: 2px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-user {
            font-size: 13px;
            color: var(--texto2);
        }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--borde);
            padding: 0 24px;
        }

        .tab {
            padding: 14px 24px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--texto2);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--texto);
        }

        .tab.active {
            color: var(--primario);
            border-bottom-color: var(--primario);
        }

        /* ── CONTENT ── */
        .content {
            padding: 24px;
            max-width: 960px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--texto);
        }

        /* ── PARTIDO ROW ── */
        .slot-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slot-row {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 1fr 60px 50px;
            gap: 10px;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--borde);
            border-radius: var(--radius);
            padding: 12px 16px;
            transition: border-color 0.2s;
        }

        .slot-row:hover {
            border-color: #333;
        }

        .slot-row.aviso-row {
            border-left: 3px solid var(--primario);
        }

        .slot-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--texto2);
            text-align: center;
        }

        .slot-input {
            padding: 10px 12px;
            background: var(--fondo);
            border: 1px solid var(--borde);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .slot-input:focus {
            border-color: var(--primario);
        }

        .aviso-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            cursor: pointer;
        }

        .toggle input {
            display: none;
        }

        .toggle .track {
            position: absolute;
            inset: 0;
            background: var(--borde);
            border-radius: 11px;
            transition: background 0.2s;
        }

        .toggle input:checked+.track {
            background: var(--primario);
        }

        .toggle .thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
            pointer-events: none;
        }

        .toggle input:checked~.thumb {
            transform: translateX(18px);
        }

        .save-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primario);
            opacity: 0;
            transition: opacity 0.3s;
            margin: 0 auto;
        }

        .save-dot.show {
            opacity: 1;
        }

        /* ── CONFIG FORM ── */
        .config-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .config-form .input-group:first-child {
            grid-column: 1 / -1;
        }

        .config-form input {
            width: 100%;
            padding: 14px 16px;
            background: var(--fondo);
            border: 1px solid var(--borde);
            border-radius: var(--radius);
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .config-form input:focus {
            border-color: var(--primario);
        }

        .save-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--primario);
            color: #000;
            padding: 12px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            pointer-events: none;
        }

        .save-banner.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            .slot-row {
                grid-template-columns: 40px 1fr 1fr;
                gap: 8px;
            }

            .slot-row .slot-input:nth-child(4) {
                grid-column: 2 / -1;
            }

            .content {
                padding: 16px;
            }

            .tabs {
                padding: 0 16px;
            }
        }

        /* ── PANTALLA HIDDEN ── */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

<body>

    <!-- ══════ LOGIN ══════ -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">MATCHVIEW</div>
            <div class="login-sub">Panel de Control</div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="admin@matchview.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Ingresar</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- ══════ ADMIN PANEL ══════ -->
    <div class="admin-panel" id="adminPanel">
        <div class="topbar">
            <div class="topbar-brand">MATCHVIEW ADMIN</div>
            <div class="topbar-right">
                <span class="topbar-user" id="userEmail"></span>
                <button class="btn btn-danger btn-sm" onclick="doLogout()">Salir</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('partidos')">Partidos</div>
            <div class="tab" onclick="switchTab('config')">Configuración</div>
        </div>

        <!-- ── TAB: PARTIDOS ── -->
        <div class="tab-content active" id="tab-partidos">
            <div class="content">
                <div class="section-title">Pantalla 1 — Slots 1–4</div>
                <div class="slot-list" id="slots-1"></div>

                <div class="section-title" style="margin-top:28px">Pantalla 2 — Slots 5–8</div>
                <div class="slot-list" id="slots-2"></div>

                <div class="section-title" style="margin-top:28px">Pantalla 3 — Slots 9–12</div>
                <div class="slot-list" id="slots-3"></div>

                <div class="section-title" style="margin-top:28px">Pantalla 4 — Slots 13–16</div>
                <div class="slot-list" id="slots-4"></div>
            </div>
        </div>

        <!-- ── TAB: CONFIG ── -->
        <div class="tab-content" id="tab-config">
            <div class="content">
                <div class="section-title">Datos del Evento</div>
                <div class="config-form">
                    <div class="input-group">
                        <label>Organizador</label>
                        <input type="text" id="cfgOrganizador" placeholder="WPE PADEL">
                    </div>
                    <div class="input-group">
                        <label>Nombre del Club</label>
                        <input type="text" id="cfgClub" placeholder="GRAN WILLY">
                    </div>
                    <div class="input-group">
                        <label>Subtítulo</label>
                        <input type="text" id="cfgSub" placeholder="PADEL CLUB">
                    </div>
                </div>
                <button class="btn btn-primary" style="width:auto; margin-top:24px" onclick="saveConfig()">Guardar
                    Configuración</button>
            </div>
        </div>
    </div>

    <!-- ── SAVE BANNER ── -->
    <div class="save-banner" id="saveBanner">✓ Guardado</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ══════════════════════════════════════════
        //  CONFIGURAR ESTAS DOS LÍNEAS
        // ══════════════════════════════════════════
        const SUPABASE_URL = 'https://wcjwjkwfztebxsujtngk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjandqa3dmenRlYnhzdWp0bmdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTk0MDUsImV4cCI6MjA4OTU5NTQwNX0.6R9gzZZhzV_KgIVHvZU_Q2d8QBNIsIcCJXHYtUSrjqc';
        // ══════════════════════════════════════════

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let partidos = [];
        let saveTimers = {};

        // ══════════════════════════════
        //  AUTH
        // ══════════════════════════════
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) showAdmin(session.user.email);
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errEl.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

            if (error) {
                errEl.textContent = 'Email o contraseña incorrectos';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
                return;
            }

            showAdmin(data.user.email);
        }

        async function doLogout() {
            await sb.auth.signOut();
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
        }

        function showAdmin(email) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('userEmail').textContent = email;
            loadPartidos();
            loadConfig();
        }

        // Enter key on login
        document.getElementById('loginPass').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        // ══════════════════════════════
        //  TABS
        // ══════════════════════════════
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${name}`).classList.add('active');
        }

        // ══════════════════════════════
        //  PARTIDOS CRUD
        // ══════════════════════════════
        async function loadPartidos() {
            const { data } = await sb.from('partidos').select('*').order('slot');
            if (!data) return;
            partidos = data;
            renderSlots();
        }

        function renderSlots() {
            for (let screen = 1; screen <= 4; screen++) {
                const container = document.getElementById(`slots-${screen}`);
                const start = (screen - 1) * 4 + 1;
                const end = screen * 4;
                const screenSlots = partidos.filter(p => p.slot >= start && p.slot <= end);

                container.innerHTML = screenSlots.map(p => `
                <div class="slot-row ${p.es_aviso ? 'aviso-row' : ''}" id="row-${p.slot}">
                    <div class="slot-num">${p.slot}</div>
                    <input class="slot-input" value="${esc(p.tag)}" placeholder="Tag / Cancha"
                        oninput="queueSave(${p.slot}, 'tag', this.value)">
                    <input class="slot-input" value="${esc(p.jugador)}" placeholder="Jugador / Texto"
                        oninput="queueSave(${p.slot}, 'jugador', this.value)">
                    <input class="slot-input" value="${esc(p.categoria)}" placeholder="Categoría"
                        oninput="queueSave(${p.slot}, 'categoria', this.value)">
                    <div class="aviso-toggle">
                        <label class="toggle">
                            <input type="checkbox" ${p.es_aviso ? 'checked' : ''}
                                onchange="queueSave(${p.slot}, 'es_aviso', this.checked)">
                            <div class="track"></div>
                            <div class="thumb"></div>
                        </label>
                    </div>
                    <div class="save-dot" id="dot-${p.slot}"></div>
                </div>
            `).join('');
            }
        }

        function esc(str) {
            return (str || '').replace(/"/g, '&quot;');
        }

        // ── Auto-save with debounce ──
        function queueSave(slot, field, value) {
            const key = `${slot}-${field}`;
            clearTimeout(saveTimers[key]);
            saveTimers[key] = setTimeout(() => saveSlot(slot, field, value), 600);
        }

        async function saveSlot(slot, field, value) {
            const { error } = await sb.from('partidos').update({ [field]: value }).eq('slot', slot);
            if (!error) flashSaved(slot);
        }

        function flashSaved(slot) {
            const dot = document.getElementById(`dot-${slot}`);
            if (dot) {
                dot.classList.add('show');
                setTimeout(() => dot.classList.remove('show'), 1200);
            }
        }

        // ══════════════════════════════
        //  CONFIG
        // ══════════════════════════════
        async function loadConfig() {
            const { data } = await sb.from('config').select('*').eq('id', 1).single();
            if (!data) return;
            document.getElementById('cfgOrganizador').value = data.organizador || '';
            document.getElementById('cfgClub').value = data.club_nombre || '';
            document.getElementById('cfgSub').value = data.club_subtitulo || '';
        }

        async function saveConfig() {
            const obj = {
                organizador: document.getElementById('cfgOrganizador').value.trim(),
                club_nombre: document.getElementById('cfgClub').value.trim(),
                club_subtitulo: document.getElementById('cfgSub').value.trim()
            };
            const { error } = await sb.from('config').update(obj).eq('id', 1);
            if (!error) {
                const banner = document.getElementById('saveBanner');
                banner.classList.add('show');
                setTimeout(() => banner.classList.remove('show'), 2000);
            }
        }

        // ══════════════════════════════
        //  INIT
        // ══════════════════════════════
        checkSession();
    </script>
</body>

</html>
